# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# User Settings
# This is where you put your own settings as this will not be touched during update 
# if the upgrade.sh is used.

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables/
# NOTE: some settings are in ~/.config/hypr/UserConfigs/UserDecorAnimations.conf
#
# Look on ~/.config/hypr/configs/SystemSettings.conf to know how to modify this

exec-once = socat -u UNIX-CONNECT:$XDG_RUNTIME_DIR/hypr/$HYPRLAND_INSTANCE_SIGNATURE/.socket2.sock \
  - | while read -r _; do pkill -RTMIN+8 waybar; done

input {
  touchpad {
    # The PIXA3848 touchpad can get stuck in libinput palm suppression after boot.
    disable_while_typing = false
  }
}

cursor {
  # On this Hyprland 0.55 + PIXA3848 setup, no_warps can leave the visible
  # pointer stuck even while libinput is receiving touchpad motion.
  no_warps = false
}

exec-once = $HOME/.config/hypr/scripts/FixPointer.sh
